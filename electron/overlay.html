<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #000;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    #overlay-root {
      width: 100vw; height: 100vh;
      position: relative;
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .word-box {
      position: absolute;
      background: rgba(255, 255, 0, 0.2);
      border: 2px solid yellow;
      cursor: pointer;
    }
    .word-box:hover {
      background: rgba(255, 255, 0, 0.45);
      border-color: #7ee787;
    }

    .tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #2a3040;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e6edf3;
      font-size: 12px;
      max-width: 320px;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .tooltip .word { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .tooltip .translation { color: #58a6ff; font-size: 13px; margin-bottom: 6px; }
    .tooltip .pronunciation { color: #7ee787; font-size: 11px; margin-bottom: 4px; }
    .tooltip .synonyms { color: #7d8590; font-size: 11px; }

    .status-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(22,27,34,0.95); border: 1px solid #2a3040;
      border-radius: 8px; padding: 8px 16px;
      color: #7d8590; font-size: 11px;
      z-index: 9999;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #58a6ff;
      animation: pulse 1.5s ease infinite; margin-right: 6px;
    }
  </style>
</head>
<body>
  <div id="overlay-root"></div>
  <script src="./overlay.js"></script>
</body>
</html>
