<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    canvas { display: block; }
    .tooltip {
      position: fixed; background: #161b22; border: 1px solid #58a6ff;
      border-radius: 8px; padding: 12px 16px; color: #e6edf3;
      font-size: 13px; max-width: 350px; z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8);
    }
    .tooltip .tw { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #e6edf3; }
    .tooltip .tt { color: #58a6ff; font-size: 14px; margin-bottom: 4px; }
    .tooltip .tp { color: #7ee787; font-size: 11px; }
    .tooltip .ts { color: #7d8590; font-size: 11px; margin-top: 4px; }
    .status-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(22,27,34,0.95); border: 1px solid #2a3040;
      border-radius: 8px; padding: 8px 16px; color: #7d8590; font-size: 11px;
      z-index: 9999;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#58a6ff; animation:pulse 1.5s ease infinite; margin-right:6px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script src="./overlay.js"></script>
</body>
</html>
