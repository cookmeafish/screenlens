<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: transparent;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    #overlay-root { position: relative; width: 100%; height: 100%; }

    .word-box {
      position: absolute;
      background: rgba(0,0,0,0.55);
      border: 2px solid #58a6ff;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .word-box:hover {
      background: rgba(0,0,0,0.8);
      border-color: #7ee787;
    }
    .word-label {
      color: #58a6ff;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    .tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #2a3040;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e6edf3;
      font-size: 12px;
      max-width: 320px;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      pointer-events: auto;
    }
    .tooltip .word { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .tooltip .translation { color: #58a6ff; font-size: 13px; margin-bottom: 6px; }
    .tooltip .pronunciation { color: #7ee787; font-size: 11px; margin-bottom: 4px; }
    .tooltip .synonyms { color: #7d8590; font-size: 11px; }
    .tooltip .pos-tag {
      display: inline-block; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 2px 6px; border-radius: 3px; margin-left: 6px;
    }

    .status-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(22,27,34,0.95); border: 1px solid #2a3040;
      border-radius: 8px; padding: 8px 16px;
      color: #7d8590; font-size: 11px;
      z-index: 9999;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #58a6ff;
      animation: pulse 1.5s ease infinite; margin-right: 6px;
    }
  </style>
</head>
<body>
  <div id="overlay-root"></div>
  <script src="overlay.js"></script>
</body>
</html>
